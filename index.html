<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contador de Calorias</title>
  <style>
    :root {
      --bg-primary: #eef3ff;
      --bg-secondary: #ffffff;
      --text-primary: #1d2a45;
      --text-secondary: #42516f;
      --border-color: rgba(255,255,255,0.6);
      --card-bg: linear-gradient(180deg, #ffffff, #f8fbff);
      --input-bg: #f7f9ff;
      --input-border: #d6dce9;
      --button-primary: linear-gradient(135deg, #0b3d91, #0a2b6f);
      --button-secondary: linear-gradient(135deg, #4f6bed, #2f8cff);
      --shadow: 0 24px 60px rgba(15, 48, 103, 0.12);
      color-scheme: light;
    }
    
    html[data-theme="dark"] {
      --bg-primary: #0f1419;
      --bg-secondary: #1a1f2e;
      --text-primary: #e8eef7;
      --text-secondary: #a8b5cc;
      --border-color: rgba(255,255,255,0.1);
      --card-bg: linear-gradient(180deg, #242d3f, #1d263a);
      --input-bg: #16202f;
      --input-border: #3a4558;
      --button-primary: linear-gradient(135deg, #1e5fd9, #1a4ba8);
      --button-secondary: linear-gradient(135deg, #6a8fff, #4a6eff);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      color-scheme: dark;
    }
    
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 16px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: Inter, Arial, sans-serif;
      transition: background 0.3s ease, color 0.3s ease;
    }
    
    .hidden {
      display: none !important;
    }
    
    .container {
      max-width: 820px;
      margin: 0 auto;
      background: var(--bg-secondary);
      padding: 32px;
      border-radius: 30px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border-color);
      transition: background 0.3s ease, box-shadow 0.3s ease;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    
    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    
    .control-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    
    .control-group label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    
    .control-group select,
    .theme-toggle {
      padding: 8px 12px;
      border: 1px solid var(--input-border);
      border-radius: 12px;
      background: var(--input-bg);
      color: var(--text-primary);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: border-color 0.2s ease, background 0.2s ease;
    }
    
    .theme-toggle {
      border: none;
      padding: 8px 14px;
      background: var(--button-secondary);
      color: white;
      font-weight: 700;
    }
    
    .theme-toggle:hover,
    .control-group select:hover {
      opacity: 0.9;
    }
    
    h1 {
      margin: 0;
      font-size: clamp(2rem, 2.5vw, 3rem);
      letter-spacing: -0.04em;
      color: var(--text-primary);
    }
    
    p {
      margin: 16px 0 28px;
      color: var(--text-secondary);
      line-height: 1.7;
    }
    
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    input[type="text"],
    input[type="number"],
    input[type="date"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--input-border);
      border-radius: 16px;
      background: var(--input-bg);
      font-size: 15px;
      color: var(--text-primary);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus {
      outline: none;
      border-color: #3f6ef8;
      box-shadow: 0 0 0 4px rgba(63, 110, 248, 0.12);
    }
    
    .form-grid {
      display: grid;
      gap: 18px;
    }
    
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }
    
    button {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    
    button:hover {
      transform: translateY(-1px);
      box-shadow: var(--shadow);
    }
    
    #estimate-button {
      background: var(--button-secondary);
    }
    
    form > button[type="submit"] {
      background: var(--button-primary);
    }
    
    .message {
      margin: 8px 0 0;
      color: var(--text-primary);
      font-size: 0.95rem;
      min-height: 1.2rem;
    }
    
    .card {
      background: var(--card-bg);
      border-radius: 24px;
      padding: 24px;
      margin-top: 28px;
      box-shadow: 0 18px 40px rgba(15, 48, 103, 0.08);
      border: 1px solid rgba(70, 88, 141, 0.08);
      transition: background 0.3s ease;
    }
    
    .card strong {
      display: block;
      margin-bottom: 16px;
      font-size: 1.05rem;
      color: var(--text-primary);
    }
    
    .entry-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }
    
    .entry-item {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px 18px;
      border-radius: 18px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      transition: background 0.3s ease;
    }
    
    .entry-item span {
      color: var(--text-primary);
      line-height: 1.5;
      flex: 1;
      min-width: 180px;
    }
    
    .entry-item button {
      background: #e02020;
      padding: 9px 14px;
      border-radius: 14px;
      font-size: 0.95rem;
      min-width: 110px;
    }
    
    .entry-item button:hover {
      background: #b81a1a;
    }
    
    .summary {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }
    
    .summary div {
      padding: 16px 18px;
      border-radius: 18px;
      background: var(--input-bg);
      color: var(--text-primary);
      font-weight: 600;
      box-shadow: inset 0 0 0 1px rgba(15,48,103,0.05);
      transition: background 0.3s ease;
    }
    
    @media (max-width: 620px) {
      .action-buttons {
        grid-template-columns: 1fr;
      }
      .container {
        padding: 24px;
      }
      .header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 data-i18n="title">Contador de Calorias</h1>
        <p data-i18n="description">Registre o alimento consumido e veja o total diário imediatamente.</p>
      </div>
      <div class="controls">
        <div class="control-group">
          <label for="language-select" data-i18n="language">Idioma:</label>
          <select id="language-select">
            <option value="pt">Português</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <button id="theme-toggle" class="theme-toggle" data-i18n="dark-mode">🌙 Escuro</button>
      </div>
    </div>

    <form id="food-form" class="form-grid">
      <div>
        <label for="food-name" data-i18n="food-label">Alimento</label>
        <input id="food-name" type="text" data-i18n="food-placeholder" placeholder="Ex: Banana" required />
      </div>

      <div>
        <label for="food-description" data-i18n="description-label">Descrição</label>
        <input id="food-description" type="text" data-i18n="description-placeholder" placeholder="Ex: frita, cozida, com azeite" />
      </div>

      <div>
        <label for="food-calories" data-i18n="calories-label">Calorias (se souber)</label>
        <input id="food-calories" type="number" min="0" step="1" data-i18n="calories-placeholder" placeholder="Ex: 105" />
        <p id="estimate-result" class="message"></p>
      </div>

      <div>
        <label for="food-date" data-i18n="date-label">Data</label>
        <input id="food-date" type="date" required />
      </div>

      <div class="action-buttons">
        <button id="estimate-button" type="button" data-i18n="estimate-btn">Estimar calorias</button>
        <button type="submit" data-i18n="add-btn">Adicionar entrada</button>
      </div>
    </form>

    <div class="card">
      <strong data-i18n="entries-title">Entradas</strong>
      <ul id="entries" class="entry-list"></ul>
      <p id="empty-message" data-i18n="no-entries">Nenhuma entrada registrada ainda.</p>
    </div>

    <div class="card summary">
      <strong data-i18n="summary-title">Resumo</strong>
      <div><span data-i18n="total-label">Total geral:</span> <span id="total-calories">0</span> calorias</div>
      <div><span data-i18n="day-label">Total do dia:</span> <span id="day-calories">0</span> calorias</div>
      <div><span data-i18n="date-selected">Data selecionada:</span> <span id="selected-date"></span></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="i18n.js"></script>
</body>
</html>
