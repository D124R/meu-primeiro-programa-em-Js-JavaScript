<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contador de Calorias</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, Arial, sans-serif;
      color: #1d2a45;
      background-color: #eef3ff;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 32px 16px;
      background: radial-gradient(circle at top left, rgba(11, 61, 145, 0.12), transparent 25%),
        radial-gradient(circle at bottom right, rgba(0, 140, 255, 0.12), transparent 20%),
        #eef3ff;
    }
    .hidden {
      display: none !important;
    }
    .container {
      max-width: 820px;
      margin: 0 auto;
      background: #ffffff;
      padding: 32px;
      border-radius: 30px;
      box-shadow: 0 24px 60px rgba(15, 48, 103, 0.12);
      border: 1px solid rgba(255,255,255,0.6);
    }
    h1 {
      margin: 0;
      font-size: clamp(2rem, 2.5vw, 3rem);
      letter-spacing: -0.04em;
      color: #0f3d91;
    }
    p {
      margin: 16px 0 28px;
      color: #42516f;
      line-height: 1.7;
    }
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      color: #344563;
    }
    input[type="text"],
    input[type="number"],
    input[type="date"] {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d6dce9;
      border-radius: 16px;
      background: #f7f9ff;
      font-size: 15px;
      color: #1d2a45;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus {
      outline: none;
      border-color: #3f6ef8;
      box-shadow: 0 0 0 4px rgba(63, 110, 248, 0.12);
    }
    .form-grid {
      display: grid;
      gap: 18px;
    }
    .action-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }
    button {
      width: 100%;
      padding: 14px 18px;
      border: none;
      border-radius: 16px;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(15, 48, 103, 0.12);
    }
    #estimate-button {
      background: linear-gradient(135deg, #4f6bed, #2f8cff);
    }
    form > button[type="submit"] {
      background: linear-gradient(135deg, #0b3d91, #0a2b6f);
    }
    #estimate-result {
      margin: 8px 0 0;
      color: #284179;
      font-size: 0.95rem;
      min-height: 1.2rem;
    }
    .card {
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      border-radius: 24px;
      padding: 24px;
      margin-top: 28px;
      box-shadow: 0 18px 40px rgba(15, 48, 103, 0.08);
      border: 1px solid rgba(70, 88, 141, 0.08);
    }
    .card strong {
      display: block;
      margin-bottom: 16px;
      font-size: 1.05rem;
      color: #13326f;
    }
    .entry-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 12px;
    }
    .entry-item {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 16px 18px;
      border-radius: 18px;
      background: #eef4ff;
      border: 1px solid rgba(88, 117, 200, 0.12);
    }
    .entry-item span {
      color: #1b2d4d;
      line-height: 1.5;
      flex: 1;
      min-width: 180px;
    }
    .entry-item button {
      background: #e02020;
      padding: 9px 14px;
      border-radius: 14px;
      font-size: 0.95rem;
      font-weight: 700;
      min-width: 110px;
    }
    .entry-item button:hover {
      background: #b81a1a;
    }
    .summary {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
    }
    .summary div {
      padding: 16px 18px;
      border-radius: 18px;
      background: #f7f9ff;
      color: #24345a;
      font-weight: 600;
      box-shadow: inset 0 0 0 1px rgba(15,48,103,0.05);
    }
    @media (max-width: 620px) {
      .action-buttons {
        grid-template-columns: 1fr;
      }
      .container {
        padding: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1 data-i18n="title">Contador de Calorias</h1>
        <p data-i18n="description">Registre o alimento consumido e veja o total diário imediatamente.</p>
      </div>
      <div class="controls">
        <div class="control-group">
          <label for="language-select" data-i18n="language">Idioma:</label>
          <select id="language-select">
            <option value="pt">Português</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
            <option value="ru">Русский</option>
            <option value="ar">العربية</option>
            <option value="ko">한국어</option>
          </select>
        </div>
        <button id="theme-toggle" class="theme-toggle" data-i18n="dark-mode">🌙 Escuro</button>
      </div>
    </div>

    <form id="food-form" class="form-grid">
      <div>
        <label for="food-name" data-i18n="food-label">Alimento</label>
        <input id="food-name" type="text" data-i18n="food-placeholder" placeholder="Ex: Banana" required />
      </div>

      <div>
        <label for="food-description" data-i18n="description-label">Descrição</label>
        <input id="food-description" type="text" data-i18n="description-placeholder" placeholder="Ex: frita, cozida, com azeite" />
      </div>

      <div>
        <label for="food-calories" data-i18n="calories-label">Calorias (se souber)</label>
        <input id="food-calories" type="number" min="0" step="1" data-i18n="calories-placeholder" placeholder="Ex: 105" />
        <p id="estimate-result" class="message"></p>
      </div>

      <div>
        <label for="food-date" data-i18n="date-label">Data</label>
        <input id="food-date" type="date" required />
      </div>

      <div class="action-buttons">
        <button id="estimate-button" type="button" data-i18n="estimate-btn">Estimar calorias</button>
        <button type="submit" data-i18n="add-btn">Adicionar entrada</button>
      </div>
    </form>

    <div class="card">
      <strong data-i18n="entries-title">Entradas</strong>
      <ul id="entries" class="entry-list"></ul>
      <p id="empty-message" data-i18n="no-entries">Nenhuma entrada registrada ainda.</p>
    </div>

    <div class="card summary">
      <strong data-i18n="summary-title">Resumo</strong>
      <div><span data-i18n="total-label">Total geral:</span> <span id="total-calories">0</span> calorias</div>
      <div><span data-i18n="day-label">Total do dia:</span> <span id="day-calories">0</span> calorias</div>
      <div><span data-i18n="date-selected">Data selecionada:</span> <span id="selected-date"></span></div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="i18n.js"></script>
</body>
</html>
